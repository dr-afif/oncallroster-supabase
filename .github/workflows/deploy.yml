name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Production Config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Sanitize secrets (remove stray whitespace/newlines)
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '\r\n[:space:]')
          CLEAN_KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '\r\n[:space:]')

          # Create config.js using printf (heredocs break in YAML due to indentation)
          printf 'window.APP_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_ANON_KEY: "%s",\n  REFRESH_INTERVAL: 0\n};\n' "$CLEAN_URL" "$CLEAN_KEY" > config.js

          echo "--- config.js content ---"
          cat config.js
          echo "-------------------------"

          # Verify the file was created and isn't empty
          if [ ! -s config.js ]; then
            echo "❌ ERROR: config.js is empty or was not created."
            exit 1
          fi
          echo "✅ config.js created successfully."

      - name: Include config.js in deployment
        run: |
          # config.js is in .gitignore (to protect local secrets)
          # We must remove it from .gitignore so the deploy action includes it
          sed -i '/^config\.js$/d' .gitignore
          echo "✅ Removed config.js from .gitignore for deployment."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
          clean: true

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "❌ ERROR: SUPABASE_URL or SUPABASE_ANON_KEY is missing in GitHub Secrets."
            echo "Please add them in Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Inject Config into HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Sanitize secrets
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '\r\n[:space:]')
          CLEAN_KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '\r\n[:space:]')
          
          # Inject into all HTML files
          echo "Injecting secrets into HTML files..."
          find . -name "*.html" -type f -exec sed -i "s|PLACEHOLDER_SUPABASE_URL|$CLEAN_URL|g" {} +
          find . -name "*.html" -type f -exec sed -i "s|PLACEHOLDER_SUPABASE_ANON_KEY|$CLEAN_KEY|g" {} +
          echo "✅ Selection of secrets injected into HTML files."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
          clean: true

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Production Config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Sanitize secrets (remove stray whitespace/newlines)
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '\r\n[:space:]')
          CLEAN_KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '\r\n[:space:]')

          # Create app-config.js using printf (heredocs break in YAML due to indentation)
          printf 'window.APP_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_ANON_KEY: "%s",\n  REFRESH_INTERVAL: 0\n};\n' "$CLEAN_URL" "$CLEAN_KEY" > app-config.js

          echo "--- app-config.js content ---"
          cat app-config.js
          echo "-----------------------------"

          # Verify the file was created and isn't empty
          if [ ! -s app-config.js ]; then
            echo "❌ ERROR: app-config.js is empty or was not created."
            exit 1
          fi
          echo "✅ app-config.js created successfully."

      - name: Prepare for GitHub Pages
        run: |
          # Create .nojekyll to bypass Jekyll processing
          touch .nojekyll
          
          # app-config.js is in .gitignore (to protect local secrets from commits)
          # Remove it so the deploy action includes the generated app-config.js
          sed -i '/^app-config\.js$/d' .gitignore
          
          echo "✅ Prepared deployment: .nojekyll created, .gitignore removed."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
          clean: true

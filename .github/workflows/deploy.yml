name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Production Config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Sanitize
          CLEAN_URL=$(echo "$SUPABASE_URL" | tr -d '\r\n[:space:]')
          CLEAN_KEY=$(echo "$SUPABASE_ANON_KEY" | tr -d '\r\n[:space:]')
          
          # 1. Create config.js directly from the environment variables
          # This overwrites the one in the repo for the production build
          cat <<EOF > config.js
          window.APP_CONFIG = {
              SUPABASE_URL: '$CLEAN_URL',
              SUPABASE_ANON_KEY: '$CLEAN_KEY',
              REFRESH_INTERVAL: 0
          };
          EOF
          echo "✅ Production config.js created safely from GitHub Secrets."
          
          # Optional: Verify the file was created and isn't empty
          if [ ! -s config.js ]; then
            echo "❌ ERROR: config.js is empty or was not created."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          branch: gh-pages # The branch the action should deploy to.
          clean: true
